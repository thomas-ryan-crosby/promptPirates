<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Prompt Pirates logo">
  <defs>
    <linearGradient id="ppBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b6dff"/>
      <stop offset="1" stop-color="#6a4cf0"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#ppBadge)"/>
  <!-- crossbones -->
  <g stroke="#ffffff" stroke-opacity=".92" stroke-width="4.2" stroke-linecap="round">
    <line x1="13" y1="30" x2="35" y2="42"/>
    <line x1="35" y1="30" x2="13" y2="42"/>
  </g>
  <g fill="#ffffff" fill-opacity=".92">
    <circle cx="13" cy="29.2" r="2.3"/><circle cx="13" cy="42.8" r="2.3"/>
    <circle cx="35" cy="29.2" r="2.3"/><circle cx="35" cy="42.8" r="2.3"/>
  </g>
  <!-- skull -->
  <circle cx="24" cy="19" r="11" fill="#ffffff"/>
  <rect x="18.5" y="26" width="11" height="8" rx="3" fill="#ffffff"/>
  <!-- eyes (prompt-cursor wink): left eye is a > chevron -->
  <path d="M17.6 16.4 l3.4 2.4 -3.4 2.4" fill="none" stroke="#5a3ff0" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="28" cy="18.8" r="3" fill="#5a3ff0"/>
  <!-- nose -->
  <path d="M24 21.6 l1.9 3.6 h-3.8 z" fill="#5a3ff0"/>
  <!-- teeth -->
  <g stroke="#5a3ff0" stroke-width="1.4" stroke-linecap="round">
    <line x1="24" y1="29.8" x2="24" y2="33.6"/>
    <line x1="21" y1="29.8" x2="21" y2="33.2"/>
    <line x1="27" y1="29.8" x2="27" y2="33.2"/>
  </g>
</svg>
